name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        id: setup_py314
        uses: actions/setup-python@v5
        continue-on-error: true
        with:
          python-version: "3.14"

      - name: Setup Python 3.13 fallback
        if: steps.setup_py314.outcome != 'success'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build EXE
        shell: pwsh
        run: .\build_windows_py314.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoryandCpuTest-windows-exe
          path: dist/MoryandCpuTest.exe
          if-no-files-found: error
